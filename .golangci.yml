version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rancher/gitsim

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
